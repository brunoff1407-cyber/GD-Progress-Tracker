kind = "web"
previewPath = "/"
title = "GD Progress Tracker"
version = "1.0.0"
id = "artifacts/gd-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22330

[services.development]
run = "pnpm --filter @workspace/gd-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gd-tracker", "run", "build" ]
publicDir = "artifacts/gd-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22330"
BASE_PATH = "/"
